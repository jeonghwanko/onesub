name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build  # tsc per-workspace — fails on type errors
      - name: Test
        run: npm test
      - name: Validate Unity UPM boundaries
        shell: pwsh
        run: ./validate-unity-packages.ps1
      - name: Bundle size check
        run: npm run size -w @onesub/server

  # The root build script skips the dashboard (Next.js), so without this job a
  # dashboard-breaking PR stays green and only fails after merge, in the
  # docker-dashboard publish workflow.
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build shared (dashboard dependency)
        run: npm run build -w @onesub/shared
      - name: Type-check dashboard
        run: npm run type-check -w @onesub/dashboard
      - name: Build dashboard
        run: npm run build -w @onesub/dashboard
