version: 2
updates:
  # npm dependencies — weekly, grouped so we don't drown in PRs.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [patch]
    ignore:
      # react-native-iap is a peer dep with a known-compatible major (v15).
      # Upgrade manually and test the SDK event flow — never auto-bump.
      - dependency-name: react-native-iap
      # @types/node must track the supported runtime (engines: node >=20).
      # Bump manually when the support line changes.
      - dependency-name: '@types/node'
        update-types: [version-update:semver-major]
      # TypeScript 6 changed node: specifier resolution + ambient types
      # handling (see closed PR #8). Revisit after 6.x matures.
      - dependency-name: typescript
        update-types: [version-update:semver-major]

  # GitHub Actions workflow pins — weekly.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
